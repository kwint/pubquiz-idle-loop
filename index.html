<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>De Mohicanen Pubquiz 2026: Goed!</title>
<style>
@font-face {
  font-family: 'KarioDuplexVar';
  src: url('KarioVar-Roman.woff2') format('woff2');
  font-weight: 10 100;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  background: #0d0221;
  cursor: none;
}

/* === Layer 1: Lava canvas === */
#lavaCanvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  filter: blur(80px);
}

/* === Layer 2: Emoji field === */
.emoji-layer {
  position: fixed;
  inset: 0;
  z-index: 2;
  overflow: hidden;
  pointer-events: none;
}

.emoji-grid {
  position: absolute;
  left: 0;
  top: 0;
  opacity: 0.20;
  line-height: 1;
  white-space: nowrap;
  will-change: transform;
}

.emoji-grid span {
  display: inline-block;
  width: 4.5rem;
  height: 4.5rem;
  line-height: 4.5rem;
  text-align: center;
  font-size: 2rem;
  will-change: transform;
}

/* Dance animations */
@keyframes dance-pop {
  0%   { transform: scale(1) rotate(0deg); }
  40%  { transform: scale(2) rotate(12deg); }
  70%  { transform: scale(0.9) rotate(-3deg); }
  100% { transform: scale(1) rotate(0deg); }
}
@keyframes dance-wiggle {
  0%, 100% { transform: rotate(0deg); }
  20%  { transform: rotate(-20deg) scale(1.2); }
  40%  { transform: rotate(18deg) scale(1.15); }
  60%  { transform: rotate(-12deg) scale(1.1); }
  80%  { transform: rotate(8deg) scale(1.05); }
}
@keyframes dance-flip {
  0%   { transform: perspective(400px) rotateY(0deg) scale(1); }
  50%  { transform: perspective(400px) rotateY(180deg) scale(1.3); }
  100% { transform: perspective(400px) rotateY(360deg) scale(1); }
}
.dance-pop    { animation: dance-pop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
.dance-wiggle { animation: dance-wiggle 1s ease-in-out forwards; }
.dance-flip   { animation: dance-flip 1.2s ease-in-out forwards; }

/* === Layer 3: Vignette === */
.vignette {
  position: fixed;
  inset: 0;
  z-index: 3;
  background: radial-gradient(ellipse at center, transparent 20%, rgba(13, 2, 33, 0.75) 100%);
  pointer-events: none;
}

/* === Layer 4: Title === */
.title-layer {
  position: fixed;
  inset: 0;
  z-index: 4;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}

.title-sub {
  font-family: 'KarioDuplexVar', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  font-weight: 10;
  font-kerning: none;
  color: rgba(255, 255, 255, 0.9);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  text-shadow:
    0 0 40px rgba(0, 0, 0, 0.95),
    0 0 80px rgba(0, 0, 0, 0.7),
    0 2px 4px rgba(0, 0, 0, 0.9);
  line-height: 1.1;
}

.title-sub span {
  animation: font_weight_wave 10s ease-in-out infinite alternate both;
}

.title-main {
  font-family: 'KarioDuplexVar', 'Arial Black', 'Segoe UI Black', sans-serif;
  font-weight: 10;
  font-kerning: none;
  line-height: 1.1;
  background-clip: text;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  will-change: filter;
}

.title-main span {
  animation: font_weight_wave 10s ease-in-out infinite alternate both;
}

@keyframes font_weight_wave {
  from { font-weight: 10; }
  to { font-weight: 100; }
}
</style>
</head>
<body>

<canvas id="lavaCanvas"></canvas>

<div class="emoji-layer">
  <div class="emoji-grid" id="emojiGrid"></div>
</div>

<div class="vignette"></div>

<div class="title-layer">
  <div class="title-sub" id="titleLine1">De Mohicanen</div>
  <div class="title-sub" id="titleLine2">Pubquiz 2026</div>
  <div class="title-main" id="titleLine3">GOED</div>
</div>

<script>
// =============================================
//  UTILITIES
// =============================================

/** Multi-frequency sine — smooth, never jumps, unique per seed */
function sn(t, seed) {
  return (
    Math.sin(t * 1.00 + seed * 1.00) * 0.50 +
    Math.sin(t * 2.31 + seed * 1.73) * 0.30 +
    Math.sin(t * 0.67 + seed * 3.11) * 0.20
  );
}

/** HSL (h: 0-360, s/l: 0-1) to [r, g, b] (0-255) */
function hslToRgb(h, s, l) {
  h = ((h % 360) + 360) % 360;
  const c = (1 - Math.abs(2 * l - 1)) * s;
  const x = c * (1 - Math.abs((h / 60) % 2 - 1));
  const m = l - c / 2;
  let r, g, b;
  if (h < 60)       { r = c; g = x; b = 0; }
  else if (h < 120) { r = x; g = c; b = 0; }
  else if (h < 180) { r = 0; g = c; b = x; }
  else if (h < 240) { r = 0; g = x; b = c; }
  else if (h < 300) { r = x; g = 0; b = c; }
  else              { r = c; g = 0; b = x; }
  return [(r + m) * 255, (g + m) * 255, (b + m) * 255];
}

function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }


// =============================================
//  LAVA LAMP — Canvas with additive blobs
// =============================================
const lavaCanvas = document.getElementById('lavaCanvas');
const ctx = lavaCanvas.getContext('2d');

function resizeCanvas() {
  // Use lower resolution for perf (the blur hides it)
  const scale = 0.5;
  lavaCanvas.width = window.innerWidth * scale;
  lavaCanvas.height = window.innerHeight * scale;
}
resizeCanvas();

const BLOB_COUNT = 8;
const blobSeeds = [];
for (let i = 0; i < BLOB_COUNT; i++) {
  blobSeeds.push({
    // Each blob gets unique seed offsets for all its properties
    posX: i * 13.7,
    posY: i * 13.7 + 50,
    size: i * 17.3 + 100,
    hue:  i * 23.1 + 200,
    stretchAmt: i * 11.9 + 300,
    stretchAngle: i * 19.3 + 400,
    // Base properties
    baseX: 0.12 + (i / BLOB_COUNT) * 0.76,
    baseY: 0.15 + ((i * 5 + 3) % BLOB_COUNT) / BLOB_COUNT * 0.70,
    baseSize: 0.18 + (i % 3) * 0.06,
    baseHue: [30, 45, 15, 280, 40, 20, 50, 35][i],
    baseSat: 0.85 + (i % 3) * 0.05,
    baseLight: 0.50 + (i % 4) * 0.03,
    baseAlpha: 0.40 + (i % 3) * 0.08,
  });
}

function drawLava(time) {
  const w = lavaCanvas.width;
  const h = lavaCanvas.height;

  // Evolving background color
  const bgHueShift = sn(time * 0.05, 999) * 25;
  const bgHue = 265 + bgHueShift;
  const bgRgb = hslToRgb(bgHue, 0.75, 0.04);
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = `rgb(${bgRgb[0]|0},${bgRgb[1]|0},${bgRgb[2]|0})`;
  ctx.fillRect(0, 0, w, h);

  // Global color temperature shift — slowly swings warm ↔ cool
  const globalHueShift = sn(time * 0.03, 777) * 45 + sn(time * 0.011, 888) * 35;

  // Global flow direction — all blobs drift in this direction
  const flowAngle = time * 0.02 + sn(time * 0.008, 555) * 1.5;
  const flowStrength = 0.04 + sn(time * 0.015, 666) * 0.02;

  ctx.globalCompositeOperation = 'lighter';

  for (const b of blobSeeds) {
    // Position: noise-driven + global flow
    const nx = b.baseX + sn(time * 0.04, b.posX) * 0.22 + Math.cos(flowAngle) * flowStrength;
    const ny = b.baseY + sn(time * 0.03, b.posY) * 0.22 + Math.sin(flowAngle) * flowStrength;
    const px = nx * w;
    const py = ny * h;

    // Size: pulsing
    const sizeMul = 1 + sn(time * 0.05, b.size) * 0.35;
    const radius = b.baseSize * Math.min(w, h) * sizeMul;

    // Color: base hue + global shift + local variation
    const hue = b.baseHue + globalHueShift + sn(time * 0.025, b.hue) * 25;
    const sat = clamp(b.baseSat + sn(time * 0.02, b.hue + 50) * 0.15, 0.5, 1);
    const light = clamp(b.baseLight + sn(time * 0.03, b.hue + 80) * 0.1, 0.35, 0.65);
    const rgb = hslToRgb(hue, sat, light);
    const alpha = b.baseAlpha + sn(time * 0.02, b.hue + 99) * 0.1;

    // Stretch/squash for organic shape
    const stretch = 1 + sn(time * 0.035, b.stretchAmt) * 0.45;
    const angle = sn(time * 0.02, b.stretchAngle) * Math.PI;

    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(angle);
    ctx.scale(stretch, 1 / stretch);

    const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, radius);
    grad.addColorStop(0,   `rgba(${rgb[0]|0},${rgb[1]|0},${rgb[2]|0},${alpha.toFixed(2)})`);
    grad.addColorStop(0.4, `rgba(${rgb[0]|0},${rgb[1]|0},${rgb[2]|0},${(alpha * 0.5).toFixed(2)})`);
    grad.addColorStop(1,   `rgba(${rgb[0]|0},${rgb[1]|0},${rgb[2]|0},0)`);

    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}


// =============================================
//  EMOJI FIELD — DOM grid with scroll & dance
// =============================================
const EMOJIS = ['👍','🏆','🎯','✅','🥇','👌','💯'];
const CELL_SIZE = 72; // 4.5rem ≈ 72px

const emojiGridEl = document.getElementById('emojiGrid');
const emojiSpans = [];

let emojiCols, emojiRows;

function buildEmojiGrid() {
  const diag = Math.sqrt(window.innerWidth ** 2 + window.innerHeight ** 2);
  emojiCols = Math.ceil((diag * 1.5) / CELL_SIZE);
  emojiRows = Math.ceil((diag * 1.5) / CELL_SIZE);

  // Track picks to avoid adjacent repeats (left and above)
  const grid = [];
  let html = '';
  for (let r = 0; r < emojiRows; r++) {
    grid[r] = [];
    for (let c = 0; c < emojiCols; c++) {
      const avoid = new Set();
      if (c > 0) avoid.add(grid[r][c - 1]);
      if (r > 0) avoid.add(grid[r - 1][c]);
      let idx;
      do {
        idx = Math.floor(Math.random() * EMOJIS.length);
      } while (avoid.has(idx) && avoid.size < EMOJIS.length - 1);
      grid[r][c] = idx;
      html += `<span data-r="${r}" data-c="${c}">${EMOJIS[idx]}</span>`;
    }
    html += '<br>';
  }
  emojiGridEl.innerHTML = html;

  // Cache references
  emojiSpans.length = 0;
  emojiGridEl.querySelectorAll('span').forEach(s => emojiSpans.push(s));
}
buildEmojiGrid();

// Scroll state — accumulates continuously, never resets
let scrollX = 0;
let scrollY = 0;
const SCROLL_SPEED = 10; // pixels per second

function updateEmojiScroll(time, dt) {
  // Move in a large slow circle — never drifts off-screen
  const RADIUS = 150; // pixels
  const PERIOD = 120; // seconds for a full loop
  const angle = time * (2 * Math.PI / PERIOD);

  scrollX = Math.cos(angle) * RADIUS;
  scrollY = Math.sin(angle) * RADIUS;

  // Position grid centered on viewport
  const gridW = emojiCols * CELL_SIZE;
  const gridH = emojiRows * CELL_SIZE;
  const cx = window.innerWidth / 2 - gridW / 2 + scrollX;
  const cy = window.innerHeight / 2 - gridH / 2 + scrollY;

  const rotation = -0.45 + sn(time * 0.015, 1234) * 0.15;
  emojiGridEl.style.transform =
    `translate(${cx.toFixed(1)}px, ${cy.toFixed(1)}px) rotate(${rotation.toFixed(4)}rad)`;
}


// --- Dance Effects ---
const DANCE_CLASSES = ['dance-pop', 'dance-wiggle', 'dance-flip'];
let nextDanceTime = 15; // first dance after 15 seconds

function maybeStartDance(time) {
  if (time < nextDanceTime) return;

  // Schedule next dance: 18–40 seconds from now
  nextDanceTime = time + 18 + Math.random() * 22;

  const danceType = Math.random();

  if (danceType < 0.4) {
    triggerWaveDance();
  } else if (danceType < 0.7) {
    triggerCascadeDance();
  } else {
    triggerPulseDance();
  }
}

function triggerWaveDance() {
  // A wave sweeps diagonally across visible emojis
  const angle = Math.random() * Math.PI * 2;
  const cosA = Math.cos(angle);
  const sinA = Math.sin(angle);
  const cls = DANCE_CLASSES[Math.floor(Math.random() * DANCE_CLASSES.length)];

  // Only animate emojis roughly in the viewport
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  const candidates = [];
  for (const span of emojiSpans) {
    const rect = span.getBoundingClientRect();
    if (rect.left > -100 && rect.right < vw + 100 && rect.top > -100 && rect.bottom < vh + 100) {
      const dist = rect.left * cosA + rect.top * sinA;
      candidates.push({ span, dist });
    }
  }

  if (candidates.length === 0) return;

  candidates.sort((a, b) => a.dist - b.dist);
  const minDist = candidates[0].dist;
  const maxDist = candidates[candidates.length - 1].dist;
  const range = maxDist - minDist || 1;

  for (const { span, dist } of candidates) {
    const progress = (dist - minDist) / range;
    const delay = progress * 2500; // wave takes 2.5s to cross

    setTimeout(() => {
      span.classList.add(cls);
      span.addEventListener('animationend', () => {
        span.classList.remove(cls);
      }, { once: true });
    }, delay);
  }
}

function triggerCascadeDance() {
  // Random emojis pop one by one — like popcorn
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  const visible = emojiSpans.filter(span => {
    const rect = span.getBoundingClientRect();
    return rect.left > -50 && rect.right < vw + 50 && rect.top > -50 && rect.bottom < vh + 50;
  });

  const count = Math.min(25 + Math.floor(Math.random() * 20), visible.length);
  const shuffled = visible.sort(() => Math.random() - 0.5).slice(0, count);

  shuffled.forEach((span, i) => {
    const delay = i * (80 + Math.random() * 120);
    const cls = DANCE_CLASSES[Math.floor(Math.random() * DANCE_CLASSES.length)];
    setTimeout(() => {
      span.classList.add(cls);
      span.addEventListener('animationend', () => {
        span.classList.remove(cls);
      }, { once: true });
    }, delay);
  });
}

function triggerPulseDance() {
  // All visible emojis do a gentle simultaneous pulse
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  const visible = emojiSpans.filter(span => {
    const rect = span.getBoundingClientRect();
    return rect.left > -50 && rect.right < vw + 50 && rect.top > -50 && rect.bottom < vh + 50;
  });

  // Stagger very slightly from center outward
  const centerX = vw / 2;
  const centerY = vh / 2;

  for (const span of visible) {
    const rect = span.getBoundingClientRect();
    const dx = rect.left + rect.width / 2 - centerX;
    const dy = rect.top + rect.height / 2 - centerY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const delay = dist * 0.5;

    setTimeout(() => {
      span.classList.add('dance-pop');
      span.addEventListener('animationend', () => {
        span.classList.remove('dance-pop');
      }, { once: true });
    }, delay);
  }
}


// =============================================
//  TITLE EFFECTS
// =============================================
const titleLine1 = document.getElementById('titleLine1');
const titleLine2 = document.getElementById('titleLine2');
const titleLine3 = document.getElementById('titleLine3');
const allTitleLines = [titleLine1, titleLine2, titleLine3];

// Split text into per-character spans for weight wave animation
// delayStep is computed so the full wave spans the animation duration
function splitIntoSpans(el, animDuration) {
  const text = el.textContent;
  const delayStep = animDuration / text.length;
  el.textContent = '';
  for (let i = 0; i < text.length; i++) {
    const span = document.createElement('span');
    span.textContent = text[i] === ' ' ? '\u00A0' : text[i];
    span.style.animationDelay = `${(-i * delayStep).toFixed(2)}s`;
    el.appendChild(span);
  }
}

splitIntoSpans(titleLine1, 10);
splitIntoSpans(titleLine2, 10);
splitIntoSpans(titleLine3, 10);

// Make all three lines the same width by adjusting font-size
// KarioDuplexVar is a duplex font — width doesn't change with weight
function equalizeWidths() {
  const targetWidth = window.innerWidth * 0.30;

  for (const el of allTitleLines) {
    // Reset to a base size to measure natural proportions
    el.style.fontSize = '100px';
  }

  // Force layout so measurements are accurate
  void document.body.offsetHeight;

  for (const el of allTitleLines) {
    const naturalWidth = el.getBoundingClientRect().width;
    const newSize = 100 * (targetWidth / naturalWidth);
    el.style.fontSize = `${newSize}px`;
  }
}

equalizeWidths();

function updateTitle(time) {
  // Gradient color evolves
  const hue1 = 45 + sn(time * 0.03, 100) * 30;
  const hue2 = 25 + sn(time * 0.025, 200) * 35;
  const hue3 = 5  + sn(time * 0.02, 300) * 30;

  const rgb1 = hslToRgb(hue1, 0.95, 0.55);
  const rgb2 = hslToRgb(hue2, 0.90, 0.50);
  const rgb3 = hslToRgb(hue3, 0.85, 0.45);

  const gradAngle = 135 + sn(time * 0.015, 444) * 30;
  const pos = 50 + sn(time * 0.04, 555) * 50; // animate gradient position

  titleLine3.style.background = `linear-gradient(
    ${gradAngle.toFixed(0)}deg,
    rgb(${rgb1[0]|0},${rgb1[1]|0},${rgb1[2]|0}) 0%,
    rgb(${rgb2[0]|0},${rgb2[1]|0},${rgb2[2]|0}) ${pos.toFixed(0)}%,
    rgb(${rgb3[0]|0},${rgb3[1]|0},${rgb3[2]|0}) 100%
  )`;
  titleLine3.style.backgroundClip = 'text';
  titleLine3.style.webkitBackgroundClip = 'text';
  titleLine3.style.webkitTextFillColor = 'transparent';

  // Breathing scale
  const breath = 1 + sn(time * 0.08, 600) * 0.025;
  titleLine3.style.transform = `scale(${breath.toFixed(4)})`;

  // Glow intensity
  const glow = 0.25 + sn(time * 0.06, 700) * 0.15;
  const glowHue = hue2;
  const glowRgb = hslToRgb(glowHue, 0.9, 0.5);
  titleLine3.style.filter = `drop-shadow(0 0 50px rgba(${glowRgb[0]|0},${glowRgb[1]|0},${glowRgb[2]|0},${glow.toFixed(2)}))`;

  // Subtitle subtle opacity breathing
  const subAlpha = 0.85 + sn(time * 0.06, 800) * 0.1;
  titleLine1.style.opacity = subAlpha.toFixed(3);
  titleLine2.style.opacity = subAlpha.toFixed(3);
}


// =============================================
//  MAIN LOOP
// =============================================
let lastTimestamp = 0;
let lavaFrame = 0;

function mainLoop(timestamp) {
  const time = timestamp / 1000; // seconds
  const dt = lastTimestamp ? (timestamp - lastTimestamp) / 1000 : 0.016;
  lastTimestamp = timestamp;

  // Cap dt to avoid jumps on tab switch
  const safeDt = Math.min(dt, 0.1);

  // Lava at 30fps — the 80px blur hides any difference
  if (++lavaFrame % 2 === 0) drawLava(time);
  updateEmojiScroll(time, safeDt);
  maybeStartDance(time);
  updateTitle(time);

  requestAnimationFrame(mainLoop);
}

requestAnimationFrame(mainLoop);


// =============================================
//  RESIZE HANDLER
// =============================================
let resizeTimeout;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(() => {
    resizeCanvas();
    buildEmojiGrid();
    equalizeWidths();
  }, 200);
});


// =============================================
//  KEYBOARD: F = fullscreen
// =============================================
document.addEventListener('keydown', (e) => {
  if (e.key === 'f' || e.key === 'F') {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen();
    }
  }
});
</script>

</body>
</html>
